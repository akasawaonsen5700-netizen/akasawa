<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI OTA最適化エンジン | 赤沢温泉旅館</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="glass-bg"></div>

  <div class="dashboard-container">
    <!-- サイドバー -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">⚡</span>
        <div>
          <h2>AI OTA最適化</h2>
          <span class="brand-sub">Akasawa Revenue Engine</span>
        </div>
      </div>
      
      <nav class="sidebar-nav">
        <button class="nav-item active" data-tab="rakuten">
          <span class="nav-icon">🔴</span> 楽天トラベル分析
        </button>
        <button class="nav-item" data-tab="jalan">
          <span class="nav-icon">🔵</span> じゃらんnet分析
        </button>
        <button class="nav-item" data-tab="booking">
          <span class="nav-icon">🟢</span> Booking.com分析
        </button>
        <button class="nav-item" data-tab="review">
          <span class="nav-icon">💬</span> 口コミ・現場改善分析
        </button>
        <button class="nav-item" data-tab="photo">
          <span class="nav-icon">📷</span> 写真・ビジュアル改善
        </button>
        <button class="nav-item" data-tab="plan">
          <span class="nav-icon">🏷️</span> プラン改善AI
        </button>
        <button class="nav-item" data-tab="rank_ad">
          <span class="nav-icon">📊</span> 順位・広告・クーポン分析
        </button>
      </nav>

      <div class="sidebar-footer">
        <p>塩原温泉 赤沢温泉旅館</p>
        <span class="version">v1.1.0 (Live Optimizer)</span>
      </div>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main-content">
      <div class="grid-layout">
        <!-- 入力エリア -->
        <section class="card input-card">
          <div class="card-header-row">
            <h2 id="active-tab-title">楽天トラベル分析</h2>
            <button id="load-demo-btn" class="demo-btn">💡 デモデータを読み込む</button>
          </div>

          <!-- 各フォームコンテナ（動的に切り替えます） -->
          <form id="ota-form">
            <!-- 1. 楽天トラベル用フォーム -->
            <div class="form-container" id="form-rakuten">
              <div class="input-group">
                <label class="form-label">現在のキャッチコピー・タイトル</label>
                <input name="catchCopy" placeholder="例: 塩原温泉 赤沢温泉旅館　猫と温泉、自然豊かな箒川を望む静かな一軒宿" />
              </div>
              <div class="input-group">
                <label class="form-label">現在の施設紹介文 (一部抜粋)</label>
                <textarea name="description" placeholder="例: 当館は源泉掛け流し100%の温泉で、猫がロビーでお出迎えします..."></textarea>
              </div>
              <div class="input-group">
                <label class="form-label">現在の主な提供プラン / 価格帯</label>
                <textarea name="plans" placeholder="例: 【スタンダード】猫に癒される静養プラン 15,000円〜"></textarea>
              </div>
            </div>

            <!-- 2. じゃらん用フォーム -->
            <div class="form-container hidden" id="form-jalan">
              <div class="input-group">
                <label class="form-label">現在のじゃらんキャッチコピー</label>
                <input name="catchCopy" placeholder="例: 【猫のいる温泉宿】のんびり、ぬる湯と地場食材の料理を満喫する休日" />
              </div>
              <div class="input-group">
                <label class="form-label">販売中のプラン構成の概要</label>
                <textarea name="plans" placeholder="例: カップル向け貸切風呂無料プラン、早期割30日前プラン、当日直前割など..."></textarea>
              </div>
              <div class="input-group">
                <label class="form-label">現在のじゃらんnetの利用ポイント還元率 / 特別な設定</label>
                <input name="points" placeholder="例: 基本2% (時々ポイント10%キャンペーンに参画)" />
              </div>
            </div>

            <!-- 3. Booking.com用フォーム -->
            <div class="form-container hidden" id="form-booking">
              <div class="input-group">
                <label class="form-label">現在のBooking.com施設概要（日本語または英語）</label>
                <textarea name="description" placeholder="例: Located in Shiobara, Akasawa Onsen Ryokan features a garden, hot springs..."></textarea>
              </div>
              <div class="input-group">
                <label class="form-label">インバウンドゲストの割合・よく来る国籍</label>
                <input name="inboundInfo" placeholder="例: 台湾、香港、アメリカからのゲストが3割" />
              </div>
              <div class="input-group">
                <label class="form-label">現在の決済設定・ポリシー</label>
                <input name="policy" placeholder="例: 事前決済のみ、3日前までキャンセル無料" />
              </div>
            </div>

            <!-- 4. 口コミ用フォーム -->
            <div class="form-container hidden" id="form-review">
              <div class="input-group">
                <label class="form-label">分析したい最近のクチコミ（複数貼り付け可）</label>
                <textarea name="reviews" placeholder="例: 露天風呂がぬるすぎた... 猫は可愛くて満足... テーブルの下に髪の毛が落ちていた..."></textarea>
              </div>
            </div>

            <!-- 5. 写真用フォーム -->
            <div class="form-container hidden" id="form-photo">
              <div class="input-group">
                <label class="form-label">現在掲載している主要写真のリストと状況</label>
                <textarea name="photoList" placeholder="例: 1. ロビーの暗めの写真 2. 温泉のガラス越し内湯 3. 猫のご飯時の写真 4. 客室の古い和室の写真..."></textarea>
              </div>
            </div>

            <!-- 6. プラン用フォーム -->
            <div class="form-container hidden" id="form-plan">
              <div class="input-group">
                <label class="form-label">現在のプラン名</label>
                <input name="planName" placeholder="例: 【スタンダード】赤沢のぬる湯と旬の創作和食プラン" />
              </div>
              <div class="input-group">
                <label class="form-label">プランの説明文</label>
                <textarea name="description" placeholder="例: 源泉掛け流しのぬる湯をお楽しみいただいた後は、当館オリジナルの創作和食をお召し上がりください..."></textarea>
              </div>
              <div class="input-group">
                <label class="form-label">設定している価格帯・特典など</label>
                <input name="details" placeholder="例: 1泊2食付き 16,500円〜、特典なし" />
              </div>
            </div>

            <!-- 7. 順位・広告用フォーム -->
            <div class="form-container hidden" id="form-rank_ad">
              <div class="input-group">
                <label class="form-label">現在の主要KWの検索順位（例：「那須塩原 温泉」）</label>
                <input name="rankings" placeholder="例: 「那須塩原 温泉」で12位、「那須塩原 猫の宿」で2位" />
              </div>
              <div class="input-group">
                <label class="form-label">月間の有料広告費と獲得数</label>
                <input name="adSpend" placeholder="例: 楽天キーワード広告 月5万円 ➔ 獲得12件" />
              </div>
              <div class="input-group">
                <label class="form-label">月間の値引き・クーポン原資（ポイントアップ含む）</label>
                <input name="couponSpend" placeholder="例: クーポン値引き原資に月10万円分使用" />
              </div>
            </div>

            <button type="submit" id="analyze-btn" class="primary-btn">
              <span class="btn-text">⚡ AI 最適化分析を実行</span>
              <div class="loader" id="loader" style="display: none;"></div>
            </button>
          </form>
        </section>

        <!-- 出力エリア -->
        <section class="card output-card">
          <div class="output-header-row">
            <h2>分析レポート</h2>
            <span class="badge" id="report-status">未分析</span>
          </div>

          <div class="placeholder-view" id="placeholder-view">
            <div class="placeholder-icon">💡</div>
            <p>左側のフォームに入力し、「AI 最適化分析を実行」を押してください。<br>OTAでの集客力を最大化するための改善レポートがここに生成されます。</p>
          </div>

          <div class="report-content hidden" id="report-content">
            <!-- 課題カード -->
            <div class="report-panel">
              <div class="panel-head">
                <h3>⚠️ 現状の課題と改善余地</h3>
              </div>
              <div class="panel-body text-block" id="report-issues"></div>
            </div>

            <!-- 提案テキスト・構成案カード -->
            <div class="report-panel">
              <div class="panel-head">
                <h3 id="panel-revised-title">📝 改善テキスト・アクション案</h3>
                <button class="copy-btn" id="copy-revised-btn" data-target="report-revised">コピー</button>
              </div>
              <div class="panel-body">
                <div class="markdown-preview" id="report-revised"></div>
              </div>
            </div>

            <!-- クーポン・プロモーション提案カード -->
            <div class="report-panel" id="promotion-panel">
              <div class="panel-head">
                <h3>🎁 クーポン・プロモーション最適化戦略</h3>
                <button class="copy-btn" id="copy-promo-btn" data-target="report-promotion">コピー</button>
              </div>
              <div class="panel-body">
                <div class="markdown-preview" id="report-promotion"></div>
              </div>
            </div>

            <!-- 優先アクションプラン -->
            <div class="report-panel">
              <div class="panel-head">
                <h3>🚀 すぐに実施すべき優先アクション</h3>
              </div>
              <div class="panel-body">
                <ul class="action-list" id="report-actions">
                  <!-- 動的にリストを追加します -->
                </ul>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
