[build]
  publish = "public"
  functions = "netlify/functions"
  command = "npm run build"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["firebase-admin", "googleapis", "@remotion/lambda"]
  ignored_node_modules = ["remotion", "@remotion/cli", "@remotion/renderer", "react", "react-dom"]

[[redirects]]
  from = "/endo-sns/*"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[scheduled.functions]]
  name = "publish-approved"
  cron = "*/15 * * * *"

[dev]
  port = 8891
  staticServerPort = 3996
