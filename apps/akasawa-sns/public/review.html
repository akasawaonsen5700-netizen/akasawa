<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>承認キュー | 赤沢温泉旅館 SNS・GBP自動配信デモ</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <header>
      <h1>承認キュー / 投稿ドラフト</h1>
      <p>レビュー待ち、承認済み、公開済みを一覧で管理します。</p>
    </header>
    <main>
      <section class="card">
        <div class="grid-3">
          <div>
            <label for="statusFilter">ステータス</label>
            <select id="statusFilter">
              <option value="all">すべて</option>
              <option value="draft">draft</option>
              <option value="review_required">review_required</option>
              <option value="approved">approved</option>
              <option value="published">published</option>
              <option value="rejected">rejected</option>
            </select>
          </div>
          <div>
            <label for="channelFilter">チャネル</label>
            <select id="channelFilter">
              <option value="all">すべて</option>
              <option value="instagram">Instagram</option>
              <option value="gbp">GBP</option>
              <option value="x">X</option>
              <option value="youtube">YouTube</option>
            </select>
          </div>
          <div>
            <label>&nbsp;</label>
            <button id="refreshBtn" class="secondary">最新化</button>
          </div>
        </div>
      </section>
      <section id="queue" class="list" style="margin-top: 18px;"></section>
    </main>
    <footer>
      <a href="index.html">アップロード画面へ戻る</a>
    </footer>
    <script src="runtime-config.js"></script>
    <script type="module" src="firebase-init.js"></script>
    <script type="module" src="review.js"></script>
  </body>
</html>
